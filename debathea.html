<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debathea</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .messages { scrollbar-width: thin; scrollbar-color: #52525b #27272a; }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(10px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    textarea { resize: none; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen pb-24">

  <!-- Header -->
  <header class="bg-black sticky top-0 z-50 border-b border-zinc-800">
    <div class="max-w-2xl mx-auto px-5 py-5 flex justify-between items-center">
      <h1 class="text-3xl font-bold tracking-tighter">Debathea</h1>
      <select id="modeSelect" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-2 text-sm focus:outline-none">
        <option value="messages">Por Mensajes</option>
        <option value="time">Por Tiempo</option>
      </select>
    </div>
  </header>

  <div class="max-w-2xl mx-auto p-4 space-y-8">

    <!-- DEBATE EN VIVO -->
    <div class="bg-zinc-900 rounded-3xl p-6 shadow-xl">
      <div class="flex justify-between items-center mb-6">
        <div id="turnInfo" class="text-xl font-semibold text-white"></div>
        <div id="viewerCount" class="flex items-center gap-2 text-zinc-400 text-sm">
          👀 <span id="viewerNum">12</span> viendo
        </div>
      </div>

      <!-- Mensajes del debate -->
      <div id="messages" class="h-80 overflow-y-auto bg-zinc-950 rounded-2xl p-5 space-y-4 messages mb-4"></div>

      <!-- Input del debate -->
      <div class="flex gap-3">
        <textarea id="debateInput" rows="3" 
          class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl p-4 focus:border-white focus:outline-none text-base"
          placeholder="Escribí tu argumento..."></textarea>
        <button onclick="sendDebateMessage()" 
          class="bg-white hover:bg-zinc-100 text-black px-7 rounded-2xl font-medium active:scale-95 transition-all">
          Enviar
        </button>
      </div>
    </div>

    <!-- ANÁLISIS / POSTS -->
    <div class="bg-zinc-900 rounded-3xl p-6">
      <h3 class="text-xl font-bold mb-5">Análisis de la comunidad</h3>
      
      <div id="postsContainer" class="space-y-4 mb-6 min-h-[100px]"></div>

      <textarea id="postInput" rows="4"
        class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4 focus:border-white focus:outline-none"
        placeholder="Escribí tu análisis del debate..."></textarea>
      
      <button onclick="addAnalysisPost()" 
        class="mt-4 w-full bg-white text-black py-4 rounded-2xl font-medium active:scale-95 transition-all">
        Publicar análisis
      </button>
    </div>

  </div>

  <!-- Panel de Espectadores (deslizable desde abajo) -->
  <div id="spectatorPanel" 
    class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t-2 border-zinc-700 rounded-t-3xl p-5 transition-all duration-300 translate-y-[70%] max-h-[65vh]">
    
    <div onclick="toggleSpectatorPanel()" 
      class="text-center py-4 bg-zinc-800 rounded-2xl font-medium cursor-pointer mb-4 active:bg-zinc-700">
      💬 Chat de Espectadores
    </div>
    
    <div id="spectatorMessages" class="h-52 overflow-y-auto bg-zinc-950 rounded-2xl p-4 space-y-3 mb-4"></div>
    
    <div class="flex gap-3">
      <input id="spectatorInput" type="text" 
        class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none"
        placeholder="Opina como espectador...">
      <button onclick="sendSpectatorMsg()" 
        class="bg-zinc-700 px-6 rounded-2xl font-medium">Enviar</button>
    </div>
  </div>

<script>
// ====================== VARIABLES ======================
let currentTurn = 0;
const users = ["Usuario1", "Usuario2"];
let mode = "messages";
let messageCount = 0;
const maxMessages = 3;
let timeLeft = 15;
let timer = null;

let debateMessages = [];
let analysisPosts = [];

// ====================== FUNCIONES ======================
function updateTurnUI() {
  const turnInfo = document.getElementById('turnInfo');
  if (mode === "messages") {
    turnInfo.innerHTML = `Turno: <span class="text-emerald-400">\( {users[currentTurn]}</span> ( \){maxMessages - messageCount} restantes)`;
  } else {
    turnInfo.innerHTML = `Turno: <span class="text-emerald-400">\( {users[currentTurn]}</span> ( \){timeLeft}s)`;
  }
}

function switchTurn() {
  currentTurn = currentTurn === 0 ? 1 : 0;
  messageCount = 0;
  timeLeft = 15;
  if (timer) clearInterval(timer);
  if (mode === "time") startTimer();
  updateTurnUI();
}

function startTimer() {
  timer = setInterval(() => {
    timeLeft--;
    updateTurnUI();
    if (timeLeft <= 0) switchTurn();
  }, 1000);
}

function sendDebateMessage() {
  const input = document.getElementById('debateInput');
  if (!input.value.trim()) return;

  const msgHTML = `
    <div class="fade-in">
      <span class="font-semibold text-emerald-400">${users[currentTurn]}:</span>
      <span class="ml-2">${input.value}</span>
    </div>`;
  
  document.getElementById('messages').innerHTML += msgHTML;
  document.getElementById('messages').scrollTop = 999999;

  input.value = "";

  if (mode === "messages") {
    messageCount++;
    if (messageCount >= maxMessages) {
      setTimeout(switchTurn, 500);
    }
  }
  updateTurnUI();
}

function addAnalysisPost() {
  const input = document.getElementById('postInput');
  if (!input.value.trim()) return;

  const postHTML = `
    <div class="bg-zinc-800 rounded-2xl p-5 fade-in">
      <p class="text-zinc-400 text-xs mb-2">Análisis • ahora</p>
      <p class="text-zinc-100">${input.value}</p>
    </div>`;
  
  document.getElementById('postsContainer').innerHTML = postHTML + document.getElementById('postsContainer').innerHTML;
  input.value = "";
}

function toggleSpectatorPanel() {
  const panel = document.getElementById('spectatorPanel');
  panel.classList.toggle('translate-y-[70%]');
  panel.classList.toggle('translate-y-0');
}

function sendSpectatorMsg() {
  const input = document.getElementById('spectatorInput');
  if (!input.value.trim()) return;

  const msgHTML = `<div class="fade-in text-amber-300"><strong>Espectador:</strong> ${
